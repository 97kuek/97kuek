name: Sync Latest Articles
on:
  # 毎日 0:15 (UTC) に自動実行
  schedule:
    - cron: "15 0 * * *"
  # 手動実行も可能にする
  workflow_dispatch:
  # main ブランチへの push でも実行
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build article thumbnail cards from portfolio RSS
        run: python .github/scripts/update_articles.py
      - name: Commit & Push
        run: |
          git config user.name "Keitaro Ueki"
          git config user.email "ueki.keitaro@gmail.com"
          git add README.md
          git diff --quiet --cached || git commit -m "chore: update latest articles from portfolio"
          git push
