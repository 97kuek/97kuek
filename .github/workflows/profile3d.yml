name: Generate 3D Contribution Graph
on:
  # 毎日 0:00 (UTC) に自動実行
  schedule:
    - cron: "0 0 * * *"
  # 手動実行も可能にする
  workflow_dispatch:
  # main ブランチへの push でも実行
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graph
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          # PERSONAL_ACCESS_TOKEN があればプライベートリポジトリも反映
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name "Keitaro Ueki"
          git config user.email "ueki.keitaro@gmail.com"
          git add -A
          # 変更があるときだけコミット（無いと workflow が失敗するため）
          git diff --quiet --cached || git commit -m "chore: update 3d contribution graph"
          git push
